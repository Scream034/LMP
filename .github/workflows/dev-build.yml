name: Dev Build

on:
  push:
    branches: [ main, avalonia ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      # Установка 7-Zip
      - name: Setup 7-Zip
        uses: milliewalky/setup-7-zip@v2

      # Получаем версию через PowerShell (надёжнее batch)
      - name: Get Git Version Info
        shell: pwsh
        run: |
          $commitCount = git rev-list --count HEAD
          $shortHash = git rev-parse --short=7 HEAD
          $version = "1.0.$commitCount"
          $fullVersion = "1.0.$commitCount.$shortHash"
          
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "FULL_VERSION=$fullVersion" >> $env:GITHUB_ENV
          echo "COMMIT_HASH=$shortHash" >> $env:GITHUB_ENV
          echo "COMMIT_COUNT=$commitCount" >> $env:GITHUB_ENV
          
          Write-Host "Version: $version"
          Write-Host "Full Version: $fullVersion"

      # Сборка Debug
      - name: Build Debug Full
        run: ./build.bat debug nopause

      # Сборка Release
      - name: Build Release Full
        run: ./build.bat publish nopause

      # Архивация Debug
      - name: Archive Debug Build
        shell: pwsh
        run: |
          $debugPath = "bin/Debug/net10.0"
          if (-not (Test-Path $debugPath)) {
            Write-Error "Debug build folder not found at $debugPath"
            exit 1
          }
          
          $archiveName = "LMP-Debug-v${{ env.FULL_VERSION }}.7z"
          7z a -t7z -mx=9 $archiveName "$debugPath/*"
          
          if (-not (Test-Path $archiveName)) {
            Write-Error "Failed to create Debug archive!"
            exit 1
          }
          Write-Host "Created: $archiveName"

      # Архивация Release
      - name: Archive Release Build
        shell: pwsh
        run: |
          if (-not (Test-Path "publish")) {
            Write-Error "Publish folder not found!"
            exit 1
          }
          
          $archiveName = "LMP-Release-v${{ env.FULL_VERSION }}.7z"
          7z a -t7z -mx=9 $archiveName "publish/*"
          
          if (-not (Test-Path $archiveName)) {
            Write-Error "Failed to create Release archive!"
            exit 1
          }
          Write-Host "Created: $archiveName"

      # Загрузка артефактов
      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LMP-Debug-v${{ env.FULL_VERSION }}
          path: LMP-Debug-v${{ env.FULL_VERSION }}.7z

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LMP-Release-v${{ env.FULL_VERSION }}
          path: LMP-Release-v${{ env.FULL_VERSION }}.7z

      # Создание Pre-release
      - name: Create Pre-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-dev.${{ github.run_number }}
          name: "Dev Build #${{ github.run_number }} (v${{ env.FULL_VERSION }})"
          prerelease: true
          files: |
            LMP-Debug-v${{ env.FULL_VERSION }}.7z
            LMP-Release-v${{ env.FULL_VERSION }}.7z
          body: |
            **Автоматическая dev-сборка #${{ github.run_number }}**

            | Параметр | Значение |
            |----------|----------|
            | Версия | `v${{ env.FULL_VERSION }}` |
            | Коммит | `${{ env.COMMIT_HASH }}` |
            | Всего коммитов | ${{ env.COMMIT_COUNT }} |

            ⚠️ **Это нестабильная автоматическая сборка!**
            
            Используется только для тестирования и быстрого показа друзьям.