name: Dev Build

on:
  push:
    branches: [ main, avalonia ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      # === Версия и информация о коммите ===
      - name: Get Git Version Info
        id: version
        shell: pwsh
        run: |
          $commitCount = git rev-list --count HEAD
          $shortHash = git rev-parse --short=7 HEAD
          $version = "1.0.$commitCount"
          $fullVersion = "1.0.$commitCount+$shortHash"
          
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "FULL_VERSION=$fullVersion" >> $env:GITHUB_ENV
          echo "COMMIT_HASH=$shortHash" >> $env:GITHUB_ENV
          echo "COMMIT_COUNT=$commitCount" >> $env:GITHUB_ENV

      # === Установка 7-Zip (максимально надёжно) ===
      - name: Setup 7-Zip
        uses: milliewalky/setup-7-zip@v2

      # === Сборка Debug ===
      - name: Build Debug Full
        run: ./build.bat debug nopause

      # === Сборка Release (publish) ===
      - name: Build Release Full
        run: ./build.bat publish nopause

      # === Архивация Debug ===
      - name: Archive Debug Build
        shell: pwsh
        run: |
          if (-not (Test-Path "bin/Debug/net10.0")) {
            Write-Error "Debug build folder not found!"
            exit 1
          }
          7z a -t7z -mx=9 "LMP-Debug-v${{ env.FULL_VERSION }}.7z" "bin/Debug/net10.0/*"
          if (-not (Test-Path "LMP-Debug-v${{ env.FULL_VERSION }}.7z")) {
            Write-Error "Failed to create Debug 7z archive!"
            exit 1
          }

      # === Архивация Release ===
      - name: Archive Release Build
        shell: pwsh
        run: |
          if (-not (Test-Path "publish")) {
            Write-Error "Publish folder not found! Publish step failed."
            exit 1
          }
          7z a -t7z -mx=9 "LMP-Release-v${{ env.FULL_VERSION }}.7z" "publish/*"
          if (-not (Test-Path "LMP-Release-v${{ env.FULL_VERSION }}.7z")) {
            Write-Error "Failed to create Release 7z archive!"
            exit 1
          }

      # === Загрузка артефактов ===
      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LMP-Debug-v${{ env.FULL_VERSION }}
          path: LMP-Debug-v${{ env.FULL_VERSION }}.7z

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LMP-Release-v${{ env.FULL_VERSION }}
          path: LMP-Release-v${{ env.FULL_VERSION }}.7z

      # === Создание Pre-release ===
      - name: Create Pre-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-dev.${{ github.run_number }}
          name: "Dev Build #${{ github.run_number }} (v${{ env.FULL_VERSION }})"
          prerelease: true
          files: |
            LMP-Debug-v${{ env.FULL_VERSION }}.7z
            LMP-Release-v${{ env.FULL_VERSION }}.7z
          body: |
            **Автоматическая dev-сборка #${{ github.run_number }}**

            - **Версия**: `v${{ env.FULL_VERSION }}`
            - **Коммит**: `${{ env.COMMIT_HASH }}`
            - **Всего коммитов**: ${{ env.COMMIT_COUNT }}

            ⚠️ **Только для тестирования, не является стабильной сборкой!**