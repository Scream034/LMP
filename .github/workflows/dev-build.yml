name: Dev Auto Build

on:
  push:
    # 1. Сборка только из основных веток (main или master)
    branches: 
      - avalonia
    
    # 2. Сборка только если изменились файлы исходного кода
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.axaml'
      - '**.xaml'
      - '**.manifest'
      - '**.xml'
      # Можно добавить другие расширения, если нужно

  workflow_dispatch: # Кнопка ручного запуска (работает всегда)

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # По умолчанию checkout берет ту ветку, в которую был push.
          # Так как мы ограничили триггер ветками main/master выше,
          # код будет браться именно из них.

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true 

      - name: Restore dependencies
        run: dotnet restore MyLiteMusicPlayer.csproj

      - name: Build Single File EXE
        run: |
          $ver = "0.0.${{ github.run_number }}"
          echo "Building Version: $ver"
          
          dotnet publish MyLiteMusicPlayer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            -o ./publish

      # 3. Переименовываем EXE
      - name: Rename EXE
        run: |
          Rename-Item -Path "./publish/MyLiteMusicPlayer.exe" -NewName "MyLiteMusicPlayer-Dev.exe"

      # 4. Упаковываем в 7z (Максимальное сжатие -mx9)
      - name: Pack to 7z
        run: |
          # 7z уже установлен на windows-latest
          7z a -t7z "./publish/MyLiteMusicPlayer-Build-${{ github.run_number }}.7z" "./publish/MyLiteMusicPlayer-Dev.exe" -mx9

      # 5. Выкладываем ТОЛЬКО .7z архив
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Dev Build #${{ github.run_number }}"
          body: |
            Автоматическая сборка из ветки **${{ github.ref_name }}**.
            Изменения в файлах кода обнаружены.
          prerelease: true
          files: ./publish/*.7z