name: Dev Build (Auto-Increment)

# Запуск:
# 1. При любом пуше в ветку main/master
# 2. Или вручную кнопкой "Run workflow"
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # Установка .NET (Внимание: для net10.0 нужен превью или актуальная версия)
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Restore dependencies
      run: dotnet restore MyLiteMusicPlayer.csproj

    # Сборка и публикация
    # -p:Version=... : Вшивает версию прямо в EXE (свойства файла)
    # -p:AssemblyVersion=... : Версия для .NET рантайма
    - name: Build Single File EXE
      run: |
        $buildNum = "${{ github.run_number }}"
        echo "Building version 0.0.$buildNum"
        
        dotnet publish MyLiteMusicPlayer.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:Version="0.0.$buildNum" `
          -p:AssemblyVersion="0.0.$buildNum" `
          -p:FileVersion="0.0.$buildNum" `
          -o ./publish

    # Переименовываем EXE, чтобы было видно номер сборки в названии файла
    - name: Rename EXE
      run: |
        $buildNum = "${{ github.run_number }}"
        Rename-Item ./publish/MyLiteMusicPlayer.exe ./publish/MyLiteMusicPlayer-Dev-$buildNum.exe

    # Создаем релиз в GitHub (помечаем как Pre-release)
    - name: Upload Dev Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: dev-build-${{ github.run_number }}  # Создаст тег dev-build-1, dev-build-2...
        name: "Dev Build #${{ github.run_number }}"
        body: |
          Автоматическая тестовая сборка №${{ github.run_number }}.
          Коммит: ${{ github.sha }}
        prerelease: true   # Помечает как "Предварительная версия"
        files: ./publish/*.exe