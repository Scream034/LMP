name: Dev Auto Build

on:
  push:
    branches: 
      - avalonia # Твоя ветка
    
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.axaml'
      - '**.xaml'
      - '**.manifest'
      - '**.xml'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true 

      - name: Restore dependencies
        run: dotnet restore MyLiteMusicPlayer.csproj

      - name: Build Single File EXE
        run: |
          $ver = "0.0.${{ github.run_number }}"
          echo "Building Version: $ver"
          
          # Мы собираем проект в папку publish
          dotnet publish MyLiteMusicPlayer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            -o ./publish

      # Переименовываем EXE для красоты
      - name: Rename EXE
        run: |
          Rename-Item -Path "./publish/MyLiteMusicPlayer.exe" -NewName "MyLiteMusicPlayer-Dev.exe"

      # Удаляем лишние PDB файлы (отладка), чтобы не мусорить в архиве
      - name: Cleanup PDBs
        run: |
          if (Test-Path ./publish/*.pdb) { Remove-Item ./publish/*.pdb }
          if (Test-Path ./publish/YoutubeExplode.xml) { Remove-Item ./publish/YoutubeExplode.xml }

      # Упаковываем ВСЁ содержимое папки publish
      - name: Pack entire folder to 7z
        run: |
          # Переходим в папку publish, чтобы в архиве файлы лежали в корне, а не в папке "publish/"
          cd publish
          
          # "." означает "всё в текущей папке"
          # -r означает рекурсивно (обязательно захватит папку libvlc)
          7z a -t7z "../MyLiteMusicPlayer-Build-${{ github.run_number }}.7z" . -mx9 -r

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Dev Build #${{ github.run_number }}"
          body: |
            Автоматическая сборка из ветки **${{ github.ref_name }}**.
            В архиве находится EXE и необходимые библиотеки (libvlc).
            Распакуйте весь архив перед запуском.
          prerelease: true
          files: ./*.7z