name: Release

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      # === Установка 7-Zip ===
      - name: Setup 7-Zip
        uses: milliewalky/setup-7-zip@v2

      # === Получаем версию из тега релиза ===
      - name: Get Version from Tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          # Убираем префикс 'v', если он есть
          $cleanVersion = $tag -replace '^v', ''
          
          echo "TAG=$tag" >> $env:GITHUB_ENV
          echo "VERSION=$cleanVersion" >> $env:GITHUB_ENV
          echo "FULL_VERSION=v$cleanVersion" >> $env:GITHUB_ENV   # Для красивого имени файла

          Write-Host "Tag: $tag"
          Write-Host "Clean version: $cleanVersion"
          Write-Host "Full version for filename: v$cleanVersion"

      # === Сборка Release (Publish) ===
      - name: Build Release Publish
        run: ./build.bat publish nopause

      # === Архивация ===
      - name: Archive Release
        shell: pwsh
        run: |
          if (-not (Test-Path "publish")) {
            Write-Error "Publish folder not found! Build failed."
            exit 1
          }
          
          $archiveName = "LMP-${{ env.FULL_VERSION }}.7z"
          7z a -t7z -mx=9 $archiveName "publish/*"
          
          if (-not (Test-Path $archiveName)) {
            Write-Error "Failed to create 7z archive!"
            exit 1
          }
          
          echo "Archive created: $archiveName"

      # === Прикрепляем архив к релизу ===
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: LMP-${{ env.FULL_VERSION }}.7z