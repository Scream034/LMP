name: Build and Release EXE

# Триггеры: запускается при пуше тега (например, v1.0) или вручную с сайта
on:
  push:
    tags:
      - 'v*' # Срабатывает на теги, начинающиеся с v (v1.0.1, v-dev, и т.д.)
  workflow_dispatch: # Позволяет запускать сборку кнопкой с сайта GitHub

permissions:
  contents: write # Разрешение на создание релизов

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive # На случай, если YoutubeExplode подключен как сабмодуль

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Ваша версия из csproj

    - name: Restore dependencies
      run: dotnet restore MyLiteMusicPlayer.csproj

    - name: Publish Windows EXE (Single File)
      run: |
        dotnet publish MyLiteMusicPlayer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./output

    - name: Zip the application
      run: Compress-Archive -Path ./output/* -DestinationPath ./MyLiteMusicPlayer-Windows.zip

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./output/MyLiteMusicPlayer.exe
          ./MyLiteMusicPlayer-Windows.zip
        generate_release_notes: true # Автоматически создаст список коммитов с прошлого релиза